services:
  db:
    image: mariadb:11
    container_name: wordpress_db
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/backups:/backups
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: lnanzotonlieu/iac-wordpress:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wordpress_app
    env_file:
      - .env
    ports:
      - "8080:80"
    volumes:
      - wp_data:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysqld-exporter
    command:
      - '--mysqld.address=db:3306'
      - '--mysqld.username=root'
    environment:
      - MYSQLD_EXPORTER_PASSWORD=${MARIADB_ROOT_PASSWORD}
    ports:
      - "9104:9104"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana-dashboard.json:/etc/grafana/dashboards/infrastructure.json:ro
    restart: unless-stopped
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    restart: unless-stopped
    depends_on:
      - discord-relay

  discord-relay:
    image: python:3.11-alpine
    container_name: discord-relay
    volumes:
      - ./discord_relay.py:/relay.py:ro
    environment:
      - DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/1505962601966862376/H6sIEJl6GcmDGCeRh5yjXWGFt3CRc0wX8G2myDa9a-4VN0dEt-OZI3IBIEOH3blRFfTu
    command: python /relay.py
    restart: unless-stopped

volumes:
  mariadb_data:
    driver: local
  wp_data:
    driver: local
  prometheus_data:
  grafana_data:
  alertmanager_data:
