version: '3.8'

services:
  db:
    image: postgres:15
    container_name: test_db
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/backups:/backups
    ports:
      - "5433:5432"

  web:
    image: nginx:alpine
    container_name: test_web
    ports:
      - "8080:80"
    volumes:
      - ./docker/html:/usr/share/nginx/html
    depends_on:
      - db

volumes:
  pgdata:
    driver: local
