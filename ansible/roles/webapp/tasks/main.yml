---
- name: Creation du repertoire de l'application
  file:
    path: "{{ webapp_dir }}"
    state: directory
    mode: "0755"

- name: Deploiement du docker-compose WordPress + MariaDB
  template:
    src: docker-compose-app.yml.j2
    dest: "{{ webapp_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart webapp

- name: Demarrage de la stack WordPress
  command: docker compose -f {{ webapp_dir }}/docker-compose.yml up -d
  args:
    chdir: "{{ webapp_dir }}"
  register: webapp_up
  changed_when: "'Started' in webapp_up.stderr or 'Created' in webapp_up.stderr"
