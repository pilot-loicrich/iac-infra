---
- name: Install Docker prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  apt_repository:
    repo: >-
      deb [arch=amd64] https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present
    update_cache: true

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present

- name: Enable and start Docker
  systemd:
    name: docker
    enabled: true
    state: started

- name: Create /opt/monitoring directory structure
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/monitoring
    - /opt/monitoring/grafana/provisioning/datasources
    - /opt/monitoring/grafana/provisioning/dashboards
    - /opt/monitoring/grafana/dashboards

- name: Copy monitoring config files
  copy:
    src: "{{ playbook_dir }}/../monitoring/{{ item }}"
    dest: /opt/monitoring/
    mode: '0644'
  loop:
    - prometheus.yml
    - alerts.yml
    - alertmanager.yml
    - grafana-dashboard.json
    - docker-compose.monitoring.yml

- name: Copy Grafana datasource provisioning
  copy:
    src: >-
      {{ playbook_dir }}/../monitoring/grafana/provisioning/datasources/prometheus.yml
    dest: /opt/monitoring/grafana/provisioning/datasources/prometheus.yml
    mode: '0644'

- name: Copy Grafana dashboard provisioning
  copy:
    src: >-
      {{ playbook_dir }}/../monitoring/grafana/provisioning/dashboards/dashboard.yml
    dest: /opt/monitoring/grafana/provisioning/dashboards/dashboard.yml
    mode: '0644'

- name: Deploy monitoring systemd service
  copy:
    src: monitoring.service
    dest: /etc/systemd/system/monitoring.service
    mode: '0644'

- name: Enable and start monitoring service
  systemd:
    name: monitoring
    enabled: true
    state: started
    daemon_reload: true

- name: Open monitoring ports in UFW
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "3000"
    - "9090"
    - "9093"
    - "9100"
