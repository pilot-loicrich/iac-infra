name: CI/CD Pipeline - Build, Test, Push, Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint YAML et Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Installation yamllint
        run: pip install yamllint
      - name: Lint YAML
        run: yamllint ansible/
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.8
      - name: Terraform validate
        run: |
          cd terraform
          terraform init
          terraform validate

  build-and-push:
    name: Build et Push image Docker
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build image Nginx custom
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/iac-nginx:latest -f docker/Dockerfile .
      - name: Push image sur Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/iac-nginx:latest

  deploy:
    name: Validation manifests Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v3
      - name: Installer yamllint
        run: pip install yamllint
      - name: Valider les manifests Kubernetes
        run: |
          echo "Validation syntaxe YAML des manifests Kubernetes"
          yamllint -d relaxed kubernetes/nginx.yml
          yamllint -d relaxed kubernetes/postgres.yml
          yamllint -d relaxed kubernetes/hpa.yml
          echo "Tous les manifests Kubernetes sont valides"
