name: CI - Lint YAML

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Installation de yamllint
        run: pip install yamllint

      - name: Lint des fichiers YAML
        run: yamllint ansible/

      - name: Validation Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.8

      - name: Terraform init
        run: |
          cd terraform
          terraform init
          terraform validate
