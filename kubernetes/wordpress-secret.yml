# SECURITE : ce fichier est un MODELE. Ne pas commiter de vrais secrets.
# En production : generer le Secret hors du depot, par exemple
#   kubectl create secret generic wordpress-secret \
#     --from-literal=MARIADB_ROOT_PASSWORD=... \
#     --from-literal=MARIADB_DATABASE=wordpress \
#     --from-literal=MARIADB_USER=wp_user \
#     --from-literal=MARIADB_PASSWORD=...
# ou utiliser un gestionnaire (Sealed Secrets, External Secrets, Vault).
apiVersion: v1
kind: Secret
metadata:
  name: wordpress-secret
type: Opaque
stringData:
  MARIADB_ROOT_PASSWORD: changeme_root
  MARIADB_DATABASE: wordpress
  MARIADB_USER: wp_user
  MARIADB_PASSWORD: changeme_wp
