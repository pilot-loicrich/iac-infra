<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl dsc" font-family="Arial, Segoe UI, Roboto, sans-serif">
<title id="ttl">Architecture iac-infra - WordPress + MariaDB</title>
<desc id="dsc">Lab local : poste Windows hebergeant une VM Ubuntu avec Docker Compose (WordPress, MariaDB, supervision), une couche Kubernetes, et la chaine CI/CD vers Discord et Docker Hub.</desc>
<defs>
<style>
  .lyr{fill:none;stroke-width:1.6}
  .navy{stroke:#1A237E}.blue{stroke:#1565C0}.teal{stroke:#00695C}.purple{stroke:#4A148C}.green{stroke:#2E7D32}
  .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.2}
  .soft{fill:#f1f5f9;stroke:#e2e8f0}
  .hdr{font-size:12.5px;font-weight:700}
  .lbl{font-size:13px;font-weight:700;fill:#1f2937}
  .sub{font-size:10.5px;fill:#64748b}
  .port{font-size:10.5px;font-weight:700;font-family:Consolas,monospace}
  .cap{font-size:10.5px;fill:#94a3b8}
  .tiny{font-size:9.5px;fill:#64748b;font-style:italic}
  line.flow{stroke:#94a3b8;stroke-width:1.4}
  text{fill:#1f2937}
</style>
<marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
</defs>

<rect x="0" y="0" width="1200" height="800" fill="#ffffff"/>

<!-- LEFT ACTORS -->
<rect class="box" x="24" y="118" width="150" height="80" rx="10"/>
<circle cx="48" cy="150" r="9" fill="#00695C"/>
<text class="lbl" x="66" y="148">Utilisateurs</text>
<text class="sub" x="66" y="166">HTTP - :8080</text>

<rect class="box" x="24" y="222" width="150" height="80" rx="10"/>
<circle cx="48" cy="254" r="9" fill="#1A237E"/>
<text class="lbl" x="66" y="252">GitHub</text>
<text class="sub" x="66" y="270">Actions + Docker Hub</text>

<rect class="box" x="24" y="326" width="150" height="80" rx="10"/>
<circle cx="48" cy="358" r="9" fill="#4A148C"/>
<text class="lbl" x="66" y="356">Discord</text>
<text class="sub" x="66" y="374">Notifications</text>

<line class="flow" x1="174" y1="158" x2="200" y2="160" marker-end="url(#ah)"/>
<line class="flow" x1="174" y1="262" x2="200" y2="250" marker-end="url(#ah)"/>
<line class="flow" x1="200" y1="430" x2="174" y2="366" marker-end="url(#ah)"/>

<!-- MAIN : POSTE WINDOWS -->
<rect class="lyr navy" x="200" y="74" width="976" height="600" rx="14"/>
<text class="hdr" x="220" y="98" fill="#1A237E">POSTE WINDOWS 11 - environnement local (VirtualBox)</text>

<rect class="soft" x="222" y="112" width="932" height="42" rx="8"/>
<text class="sub" x="236" y="138" font-size="11.5"><tspan font-weight="700" fill="#1f2937">Provisioning IaC :</tspan>  Vagrant -&gt; VM  -  Ansible (4 roles : common - security - monitoring - webapp)  -  Terraform -&gt; inventaire</text>

<!-- VM box -->
<rect class="lyr blue" x="222" y="166" width="932" height="306" rx="12"/>
<text class="hdr" x="240" y="188" fill="#1565C0">VM Ubuntu 22.04 - host-only 192.168.56.10 - Docker Compose (8 conteneurs)</text>

<!-- app network -->
<rect class="lyr teal" x="242" y="200" width="892" height="112" rx="10"/>
<text class="hdr" x="258" y="220" fill="#00695C">Reseau applicatif</text>
<rect class="box" x="320" y="232" width="220" height="64" rx="9"/>
<text class="lbl" x="338" y="260">WordPress</text>
<text class="sub" x="338" y="278">Apache - image durcie</text>
<rect x="476" y="244" width="46" height="20" rx="10" fill="#E3F2FD"/><text class="port" x="486" y="258" fill="#1565C0">:80</text>
<line class="flow" x1="548" y1="264" x2="612" y2="264" marker-end="url(#ah)"/>
<text class="tiny" x="556" y="258">SQL</text>
<rect class="box" x="620" y="232" width="220" height="64" rx="9"/>
<text class="lbl" x="638" y="260">MariaDB 11</text>
<text class="sub" x="638" y="278">base wordpress - PVC</text>
<rect x="776" y="244" width="56" height="20" rx="10" fill="#E8F5E9"/><text class="port" x="786" y="258" fill="#2E7D32">:3306</text>

<!-- supervision network -->
<rect class="lyr purple" x="242" y="324" width="892" height="134" rx="10"/>
<text class="hdr" x="258" y="344" fill="#4A148C">Reseau de supervision</text>
<rect class="box" x="300" y="356" width="160" height="50" rx="9"/>
<text class="lbl" x="316" y="380" font-size="12">Prometheus</text><text class="port" x="316" y="396" fill="#E65100">:9090</text>
<line class="flow" x1="466" y1="381" x2="500" y2="381" marker-end="url(#ah)"/>
<rect class="box" x="506" y="356" width="160" height="50" rx="9"/>
<text class="lbl" x="522" y="380" font-size="12">Grafana</text><text class="port" x="522" y="396" fill="#E65100">:3000</text>
<line class="flow" x1="672" y1="381" x2="706" y2="381" marker-end="url(#ah)"/>
<rect class="box" x="712" y="356" width="200" height="50" rx="9"/>
<text class="lbl" x="728" y="380" font-size="12">Alertmanager</text><text class="port" x="728" y="396" fill="#E65100">:9093</text>
<line class="flow" x1="912" y1="381" x2="950" y2="381" marker-end="url(#ah)"/>
<text class="sub" x="952" y="385" font-weight="700" fill="#4A148C">-&gt; relay -&gt; Discord</text>
<rect x="300" y="418" width="180" height="26" rx="13" fill="#f8fafc" stroke="#e2e8f0"/><text class="sub" x="316" y="435">node-exporter <tspan class="port" fill="#E65100">:9100</tspan></text>
<rect x="492" y="418" width="200" height="26" rx="13" fill="#f8fafc" stroke="#e2e8f0"/><text class="sub" x="508" y="435">mysqld-exporter <tspan class="port" fill="#E65100">:9104</tspan></text>
<rect x="704" y="418" width="210" height="26" rx="13" fill="#f8fafc" stroke="#e2e8f0"/><text class="sub" x="720" y="435">discord-relay (Python) <tspan class="port" fill="#E65100">:9094</tspan></text>

<!-- Kubernetes layer -->
<rect class="lyr green" x="222" y="484" width="932" height="66" rx="12"/>
<text class="hdr" x="240" y="506" fill="#2E7D32">Kubernetes (orchestration) - kubectl apply -f kubernetes/</text>
<text class="sub" x="240" y="532" font-size="11.5">WordPress x2 replicas  -  Service NodePort :30080  -  MariaDB + PVC  -  Secret  -  HPA 2-&gt;10 (CPU 50%)</text>

<!-- security bar -->
<rect x="222" y="560" width="932" height="38" rx="9" fill="#FFF5F5" stroke="#B71C1C" stroke-dasharray="4 3"/>
<text class="sub" x="238" y="584" font-size="11"><tspan font-weight="700" fill="#B71C1C">Securite :</tspan>  UFW deny par defaut - ports 22/80/443 - SSH hardening (no root, no password) - secrets hors depot (.env gitignore, Ansible Vault) - scan Trivy en CI</text>

<text class="tiny" x="240" y="624">Prometheus scrute les metriques toutes les 15 s - le relay Python traduit l'alerte au format Discord (HTTP 204)</text>

<!-- FOOTER -->
<rect class="box" x="24" y="694" width="730" height="74" rx="10"/>
<text class="lbl" x="42" y="718" font-size="12">Integration et livraison continues</text>
<text class="sub" x="42" y="738" font-size="11">GitHub Actions : <tspan font-weight="700">lint</tspan> (yamllint + terraform validate) -&gt; <tspan font-weight="700">build</tspan> image WordPress</text>
<text class="sub" x="42" y="754" font-size="11">-&gt; <tspan font-weight="700">push</tspan> Docker Hub (iac-wordpress) -&gt; <tspan font-weight="700">validate</tspan> manifests K8s + scan Trivy</text>

<rect class="box" x="770" y="694" width="406" height="74" rx="10"/>
<text class="lbl" x="788" y="718" font-size="12">Sauvegarde des donnees</text>
<text class="sub" x="788" y="738" font-size="11">mariadb-dump -&gt; docker/backups</text>
<text class="sub" x="788" y="754" font-size="11">script backup-mariadb.sh - restauration testee</text>

<text class="cap" x="24" y="788">Chaque libelle correspond a un fichier reel du depot - Vagrantfile - ansible/ - terraform/ - docker-compose.yml - kubernetes/ - .github/workflows/ci.yml</text>
</svg>
